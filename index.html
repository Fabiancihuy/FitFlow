<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Fitflow - Track Your Journey</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
  <div class="container-fluid min-vh-100">
    <div class="row min-vh-100">
      <div class="col-md-6 d-none d-md-block p-0">
        <img src="images.jpg" alt="olahraga" style="width: 100%; height: 100%; object-fit: cover;">
      </div>

      <div class="col-md-6 d-flex align-items-center justify-content-center bg-white">
        <div style="width: 100%; max-width: 380px; padding: 2rem;">

          <div class="mb-4">
            <i class="bi bi-fire"></i>
            <h4 class="fw-bold mb-0">FitFlow</h4>
            <small class="text-muted">Track Your Journey</small>
          </div>

          <h5 class="fw-bold mb-1">Selamat Datang!</h5>
          <p class="text-muted small mb-4">Masuk untuk melanjutkan.</p>

          <div class="mb-3">
            <label class="form-label fw-semibold small">Email</label>
            <input type="email" class="form-control rounded-3" placeholder="nama@email.com">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold small">Kata Sandi</label>
            <input type="password" class="form-control rounded-3" placeholder="Masuk kan kata sandi">
          </div>

          <div class="d-grid mb-3">
            <a href="dashboard.html" class="btn btn-dark rounded-pill py-2">
              Masuk
            </a>

            <hr>

            <p class="text-muted small text-center mb-0">
              &copy; 2026 FitFlow. Dibuat untuk kesehatan kalian
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
